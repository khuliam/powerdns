---
- name: Download MariaDB installation script
  get_url:
    url: https://downloads.mariadb.com/MariaDB/mariadb_repo_setup
    dest: /tmp/mariadb_repo_setup
    mode: '0755'

- name: Execute mariadb script
  command: bash mariadb_repo_setup
  args:
    chdir: /tmp

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install MariaDB
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - mariadb-server
    - mariadb-client

- name: Démarrer et activer MariaDB
  systemd:
    name: mariadb
    state: started
    enabled: yes

- name: Copy my.cnf to ~/.my.cnf on ansible host
  copy:
    src: .my.cnf
    dest: ~/.my.cnf
    mode: '0600'
  delegate_to: localhost

- name: Update root user authentication method
  mysql_user:
    name: root
    host: localhost
    plugin: mysql_native_password
    password: ""
    state: present

- name: Create database named {{ database_name }}
  mysql_db:
    name: "{{ database_name }}"
    state: present
    login_user: root
    login_password: ""

- name: Grant all privileges
  mysql_user:
    name: "{{ database_user }}"
    password: "{{ database_admin_password }}"
    priv: "{{ database_name }}.*:ALL"
    host: "%"
    state: present
    login_user: root
    login_password: "{{ database_admin_password }}"

- name: Update the privileges
  mysql_user:
    name: "{{ database_user }}"
    priv: "{{ database_name }}.*:ALL"
    host: "%"
    state: present
    login_user: root
    login_password: "{{ database_admin_password }}"
    append_privs: yes

- name: Refresh the privileges
  command: mysql -e "FLUSH PRIVILEGES;"