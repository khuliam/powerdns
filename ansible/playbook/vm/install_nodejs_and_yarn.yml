---
- name: Add Node.js repository
  shell: curl -sL https://deb.nodesource.com/setup_16.x | sudo -E bash -

- name: Install Node.js
  apt:
    name: nodejs
    state: present

- name: Add Yarn repository GPG key
  shell: curl -sL https://dl.yarnpkg.com/debian/pubkey.gpg | sudo tee /usr/share/keyrings/yarnkey.gpg >/dev/null

- name: Add Yarn repository to sources.list.d
  command: echo "deb [signed-by=/usr/share/keyrings/yarnkey.gpg] https://dl.yarnpkg.com/debian stable main" | sudo tee /etc/apt/sources.list.d/yarn.list

- name: Install Yarn
  apt:
    name: yarn
    state: present
    update_cache: yes
