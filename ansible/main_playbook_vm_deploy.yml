---
- name : Install powerdns
  hosts: powerdns
  become: true

  pre_tasks:
    - name: include vars file
      include_vars: "vars.yml"

  tasks:
    - include_tasks: playbook/vm/1_requirements.yml
    - include_tasks: playbook/vm/2_install_mariadb.yml
    - include_tasks: playbook/vm/3_install_pdns.yml
    - include_tasks: playbook/vm/4_install_nodejs_and_yarn.yml
    - include_tasks: playbook/vm/5_install_pdns_frontend.yml
    - include_tasks: playbook/vm/6_install_nginx.yml
    - include_tasks: playbook/vm/7_create_pdns_systemfils.yml
    - include_tasks: playbook/vm/8_security_allow_port.yml